<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Trivia Quest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; color: #f0e8d8; background-color: #1a237e; }
        .ff9-font { font-family: 'Cinzel Decorative', cursive; }
        .quiz-container { background-color: rgba(18, 28, 80, 0.85); border: 2px solid #a4b7d8; backdrop-filter: blur(5px); }
        .btn-primary { background-color: #3b5998; border: 2px solid #a4b7d8; transition: all 0.2s; }
        .btn-primary:hover:not(:disabled) { background-color: #4c72c0; }
        .answer-btn { background-color: rgba(42, 63, 109, 0.7); border: 2px solid #6a82b3; margin-top: 10px; padding: 10px; width: 100%; border-radius: 8px; }
        .correct { background-color: #22c55e !important; }
        .incorrect { background-color: #ef4444 !important; }
        .boss-text { color: #f87171; font-weight: bold; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="quiz-container" class="quiz-container w-full max-w-2xl rounded-2xl p-8 text-center shadow-2xl">
        <div id="title-screen">
            <h1 class="ff9-font text-4xl text-yellow-300 mb-8">Ultimate Trivia Quest</h1>
            <div id="name-selection-buttons" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <button data-name="patrick" class="name-btn btn-primary py-3 rounded-lg">Patrick</button>
                <button data-name="hannah" class="name-btn btn-primary py-3 rounded-lg">Hannah</button>
                <button data-name="jillian" class="name-btn btn-primary py-3 rounded-lg">Jillian</button>
            </div>
        </div>

        <div id="quiz-screen" class="hidden">
            <p id="round-indicator" class="ff9-font text-yellow-300 mb-1"></p>
            <p id="question-counter" class="text-sm text-stone-300 mb-4"></p>
            <h2 id="question-text" class="text-2xl font-bold mb-6"></h2>
            
            <div id="flashcard-ui" class="space-y-4">
                <button id="show-options-btn" class="btn-primary py-3 px-6 rounded-lg w-full">Show Multiple Choice</button>
                <div id="manual-answer-area" class="space-y-4">
                    <button id="reveal-btn" class="btn-primary py-3 px-6 rounded-lg w-full">Reveal Answer</button>
                </div>
                <div id="manual-grading" class="hidden grid grid-cols-2 gap-4">
                    <button id="manual-correct" class="btn-primary bg-green-700 py-3 rounded-lg">Got it right (+2pts)</button>
                    <button id="manual-wrong" class="btn-primary bg-red-700 py-3 rounded-lg">Got it wrong</button>
                </div>
            </div>

            <div id="answer-buttons" class="hidden grid grid-cols-1 md:grid-cols-2 gap-4 mt-6"></div>
            <button id="next-btn" class="btn-primary py-3 px-8 rounded-lg mt-8 w-full hidden">Next Question</button>
        </div>
    </div>

    <script>
    let quizData = { patrick: [], hannah: [], jillian: [] };
    let askedQuestions = new Set(JSON.parse(localStorage.getItem('askedQuestions')) || []);
    let playerScores = JSON.parse(localStorage.getItem('quizPlayerScores')) || { patrick: 0, hannah: 0, jillian: 0 };
    let currentQuestSequence = [], currentQuestionIndex = 0, currentQuestion, currentPlayerName = '', currentSessionScore = 0, maxSessionScore = 0;

    async function loadAllQuizData() {
        try {
            const fetchAndParse = async (f) => { const r = await fetch(f); return JSON.parse(await r.text()); };
            quizData.patrick = (await fetchAndParse('patrick_questions.json')).map(q => ({...q, theme: 'patrick'}));
            quizData.hannah = (await fetchAndParse('hannah_questions.json')).map(q => ({...q, theme: 'hannah'}));
            quizData.jillian = (await fetchAndParse('jillian_questions.json')).map(q => ({...q, theme: 'jillian'}));
        } catch (e) { document.body.innerHTML = "<h1>Error Loading Data</h1>"; }
    }

    function getRandomQuestions(array, count) {
        let available = array.filter(q => !askedQuestions.has(q.question));
        if (available.length < count) available = [...array]; 
        return available.sort(() => Math.random() - 0.5).slice(0, count);
    }

    function buildQuestSequence(theme) {
        const themeQs = quizData[theme];
        const textQs = themeQs.filter(q => !q.imageSrc && !q.audioSrc);
        currentQuestSequence = [
            ...getRandomQuestions(textQs, 3).map(q => ({...q, roundTitle: 'Round 1: Text'})),
            ...getRandomQuestions(themeQs.filter(q => q.imageSrc), 3).map(q => ({...q, roundTitle: 'Round 2: Visual'})),
            ...getRandomQuestions(themeQs.filter(q => q.audioSrc), 3).map(q => ({...q, roundTitle: 'Round 3: Audio'}))
        ];
        let otherHardQs = [];
        Object.keys(quizData).forEach(t => { if (t !== theme) otherHardQs = otherHardQs.concat(quizData[t].filter(q => q.difficulty?.toLowerCase() === 'hard')); });
        currentQuestSequence.push(...getRandomQuestions(otherHardQs.length ? otherHardQs : textQs, 1).map(q => ({...q, roundTitle: 'Final Boss Question!'})));
        currentQuestionIndex = 0; currentSessionScore = 0; maxSessionScore = 0;
    }

    function showNextQuestion() {
        document.getElementById('flashcard-ui').classList.remove('hidden');
        document.getElementById('show-options-btn').classList.remove('hidden');
        document.getElementById('manual-answer-area').classList.remove('hidden');
        document.getElementById('manual-grading').classList.add('hidden');
        document.getElementById('answer-buttons').classList.add('hidden');
        document.getElementById('next-btn').classList.add('hidden');
        
        currentQuestion = currentQuestSequence[currentQuestionIndex];
        askedQuestions.add(currentQuestion.question);
        localStorage.setItem('askedQuestions', JSON.stringify([...askedQuestions]));

        document.getElementById('round-indicator').innerText = currentQuestion.roundTitle;
        document.getElementById('question-counter').innerText = `Question ${currentQuestionIndex + 1} of 10`;
        document.getElementById('question-text').innerText = currentQuestion.question;

        document.getElementById('show-options-btn').onclick = () => {
            document.getElementById('flashcard-ui').classList.add('hidden');
            document.getElementById('answer-buttons').classList.remove('hidden');
            renderMultipleChoice();
        };

        document.getElementById('reveal-btn').onclick = () => {
            const correctAns = currentQuestion.answers.find(a => a.correct).text;
            document.getElementById('question-text').innerText += `\n\nAnswer: ${correctAns}`;
            document.getElementById('manual-answer-area').classList.add('hidden');
            document.getElementById('manual-grading').classList.remove('hidden');
        };

        document.getElementById('manual-correct').onclick = () => gradeAnswer(true, true);
        document.getElementById('manual-wrong').onclick = () => gradeAnswer(false, true);
    }

    function gradeAnswer(isCorrect, isManual) {
        const pts = isManual ? (currentPlayerName !== currentQuestion.theme ? 4 : 2) : (currentPlayerName !== currentQuestion.theme ? 3 : 1);
        maxSessionScore += pts;
        if (isCorrect) { currentSessionScore += pts; playerScores[currentPlayerName] += pts; }
        localStorage.setItem('quizPlayerScores', JSON.stringify(playerScores));
        document.getElementById('next-btn').classList.remove('hidden');
        document.getElementById('next-btn').innerText = (currentQuestionIndex === 9) ? "Complete Quest" : "Next Question";
        document.getElementById('manual-grading').classList.add('hidden');
        document.getElementById('answer-buttons').classList.add('hidden');
    }

    function renderMultipleChoice() {
        const area = document.getElementById('answer-buttons');
        area.innerHTML = '';
        currentQuestion.answers.forEach(ans => {
            const b = document.createElement('button');
            b.innerText = ans.text; b.className = 'answer-btn';
            b.onclick = () => { gradeAnswer(ans.correct, false); b.classList.add(ans.correct ? 'correct' : 'incorrect'); };
            area.appendChild(b);
        });
    }

    document.querySelectorAll('.name-btn').forEach(btn => btn.onclick = (e) => {
        currentPlayerName = e.target.dataset.name;
        document.getElementById('title-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        buildQuestSequence(currentPlayerName);
        showNextQuestion();
    });

    document.getElementById('next-btn').onclick = () => {
        currentQuestionIndex++;
        (currentQuestionIndex < 10) ? showNextQuestion() : alert(`Score: ${currentSessionScore}/${maxSessionScore}`);
    };

    loadAllQuizData();
    </script>
</body>
</html>
