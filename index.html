<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Master Quest Trivia</title>
    <style>
        :root {
            --primary: #4a90e2;
            --secondary: #f5f5f5;
            --accent: #f39c12;
            --dark: #2c3e50;
            --success: #27ae60;
            --error: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        #game-container {
            background-color: white;
            color: var(--dark);
            width: 90%;
            max-width: 700px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        .hidden { display: none; }

        /* Setup Screen */
        .setup-section { margin-bottom: 25px; border-bottom: 1px solid #ddd; padding-bottom: 15px; }
        .toggle-group { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin: 15px 0; }
        
        select, button {
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
            cursor: pointer;
        }

        #start-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            font-weight: bold;
            transition: transform 0.2s;
        }

        #start-btn:hover { transform: scale(1.05); }

        /* Quiz Area */
        #media-container img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
            margin: 15px 0;
            border: 3px solid var(--secondary);
        }

        audio { width: 100%; margin: 15px 0; }

        #answer-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            background-color: var(--secondary);
            border: 2px solid #ddd;
            padding: 15px;
            border-radius: 8px;
            transition: all 0.2s;
            font-weight: 500;
        }

        .btn:hover { background-color: #eee; border-color: var(--primary); }
        .btn.correct { background-color: var(--success) !important; color: white; }
        .btn.wrong { background-color: var(--error) !important; color: white; }

        #score-display { font-weight: bold; margin-bottom: 10px; color: var(--primary); }
    </style>
</head>
<body>

<div id="game-container">
    <!-- SETUP SCREEN -->
    <div id="setup-screen">
        <h1>⚔️ The Master Quest</h1>
        
        <div class="setup-section">
            <p><strong>1. Who is playing?</strong></p>
            <select id="user-select">
                <option value="patrick_questions.json">Patrick</option>
                <option value="hannah_questions.json">Hannah</option>
                <option value="jillian_questions.json">Jillian</option>
            </select>
        </div>

        <div class="setup-section">
            <p><strong>2. Challenge Types:</strong></p>
            <div class="toggle-group">
                <label><input type="checkbox" id="check-text" checked> 📝 Text</label>
                <label><input type="checkbox" id="check-image" checked> 🖼️ Image</label>
                <label><input type="checkbox" id="check-audio" checked> 🔊 Audio</label>
            </div>
        </div>

        <button id="start-btn" onclick="loadAndStart()">Begin the Quest</button>
    </div>

    <!-- QUIZ SCREEN -->
    <div id="quiz-screen" class="hidden">
        <div id="score-display">Question 1/?? | Score: 0</div>
        <h2 id="question-text">Question goes here?</h2>
        <div id="media-container"></div>
        <div id="answer-buttons"></div>
        <button id="next-btn" class="hidden" style="margin-top:20px; width:100%; background: var(--accent); color:white;" onclick="nextQuestion()">Next Question ➜</button>
    </div>

    <!-- RESULT SCREEN -->
    <div id="result-screen" class="hidden">
        <h1>Quest Complete!</h1>
        <p id="final-score-text"></p>
        <button onclick="location.reload()">Try Another Quest</button>
    </div>
</div>

<script>
    let masterData = [];
    let filteredQuestions = [];
    let currentIdx = 0;
    let score = 0;

    async function loadAndStart() {
        const file = document.getElementById('user-select').value;
        const wantText = document.getElementById('check-text').checked;
        const wantImage = document.getElementById('check-image').checked;
        const wantAudio = document.getElementById('check-audio').checked;

        try {
            const response = await fetch(file);
            masterData = await response.json();
            
            // Filtering Logic
            filteredQuestions = masterData.filter(q => {
                const hasImage = q.hasOwnProperty('imageSrc');
                const hasAudio = q.hasOwnProperty('audioSrc');
                const isText = !hasImage && !hasAudio;

                if (wantText && isText) return true;
                if (wantImage && hasImage) return true;
                if (wantAudio && hasAudio) return true;
                return false;
            });

            if (filteredQuestions.length === 0) {
                alert("No questions found for those settings! Try enabling more types.");
                return;
            }

            // Shuffle and Start
            shuffle(filteredQuestions);
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            showQuestion();

        } catch (error) {
            alert("Error loading question file. Make sure the JSON files are in the same folder!");
            console.error(error);
        }
    }

    function showQuestion() {
        resetState();
        const q = filteredQuestions[currentIdx];
        
        document.getElementById('score-display').innerText = `Question ${currentIdx + 1}/${filteredQuestions.length} | Score: ${score}`;
        document.getElementById('question-text').innerText = q.question;

        const mediaBox = document.getElementById('media-container');
        if (q.imageSrc) {
            const img = document.createElement('img');
            img.src = q.imageSrc;
            mediaBox.appendChild(img);
        }
        if (q.audioSrc) {
            const audio = document.createElement('audio');
            audio.src = q.audioSrc;
            audio.controls = true;
            audio.autoplay = true;
            mediaBox.appendChild(audio);
        }

        q.answers.forEach(ans => {
            const button = document.createElement('button');
            button.innerText = ans.text;
            button.classList.add('btn');
            button.onclick = () => selectAnswer(button, ans.correct);
            document.getElementById('answer-buttons').appendChild(button);
        });
    }

    function selectAnswer(btn, isCorrect) {
        const allBtns = document.querySelectorAll('.btn');
        allBtns.forEach(b => b.disabled = true); // Prevent double clicking

        if (isCorrect) {
            btn.classList.add('correct');
            score++;
        } else {
            btn.classList.add('wrong');
            // Show the correct one
            const correctBtn = Array.from(allBtns).find((_, i) => filteredQuestions[currentIdx].answers[i].correct);
            correctBtn.classList.add('correct');
        }
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < filteredQuestions.length) {
            showQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-score-text').innerText = `You scored ${score} out of ${filteredQuestions.length}!`;
    }

    function resetState() {
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('media-container').innerHTML = '';
        document.getElementById('answer-buttons').innerHTML = '';
    }

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }
</script>

</body>
</html>
