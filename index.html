<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Fantasy IX - Ultimate Trivia Quest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            color: #f0e8d8;
            background-color: #1a237e;
            background-image: 
                url('https://www.transparenttextures.com/patterns/diagmonds.png'),
                radial-gradient(ellipse at center, #303f9f 0%, #1a237e 100%);
            background-attachment: fixed;
        }
        .ff9-font { font-family: 'Cinzel Decorative', cursive; }
        .quiz-container {
            background-color: rgba(18, 28, 80, 0.85);
            border: 2px solid #a4b7d8;
            box-shadow: 0 0 20px rgba(164, 183, 216, 0.5), inset 0 0 15px rgba(18, 28, 80, 0.7);
            backdrop-filter: blur(5px);
        }
        .btn-primary {
            background-color: #3b5998;
            border: 2px solid #a4b7d8;
            transition: all 0.3s ease;
            box-shadow: 0 4px #2a3f6d;
        }
        .btn-primary:hover:not(:disabled) { background-color: #4c72c0; transform: translateY(-2px); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }
        .answer-btn {
            background-color: rgba(42, 63, 109, 0.7);
            border: 2px solid #6a82b3;
            transition: all 0.3s ease;
        }
        .answer-btn.correct { background-color: #22c55e; border-color: #f0e8d8; }
        .answer-btn.incorrect { background-color: #ef4444; border-color: #f0e8d8; }
        .boss-text { color: #f87171; text-shadow: 0 0 10px rgba(239, 68, 68, 0.8); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <button id="back-to-select-btn" class="hidden btn-primary ff9-font absolute top-5 left-5 py-2 px-4 rounded-lg z-20 text-sm">Hero Select</button>

    <div id="persistent-scores-container" class="absolute top-5 right-5 z-20 text-right p-4 rounded-lg quiz-container ff9-font">
        <h3 class="text-yellow-300 text-lg mb-2">Total Scores</h3>
        <p class="text-sm">Patrick: <span id="patrick-score">0</span></p>
        <p class="text-sm">Hannah: <span id="hannah-score">0</span></p>
        <p class="text-sm">Jillian: <span id="jillian-score">0</span></p>
        <div class="mt-3">
            <input id="volume-slider" type="range" min="0" max="1" step="0.01" value="0.2" class="w-24">
        </div>
    </div>
    
    <div id="quiz-container" class="quiz-container w-full max-w-2xl mx-auto rounded-2xl p-6 md:p-8 text-center">
        <div class="relative z-10">
            
            <div id="title-screen">
                <div id="loading-overlay" class="absolute inset-0 bg-gray-900 bg-opacity-90 flex flex-col items-center justify-center z-30 rounded-2xl">
                    <h2 class="ff9-font text-2xl text-yellow-300 animate-pulse">Loading Quests...</h2>
                </div>
                <h1 class="ff9-font text-3xl md:text-5xl font-bold text-yellow-300 mb-8">Select Your Hero</h1>
                <div id="name-selection-buttons" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <button data-name="patrick" class="name-btn btn-primary ff9-font py-3 rounded-lg">Patrick</button>
                    <button data-name="hannah" class="name-btn btn-primary ff9-font py-3 rounded-lg">Hannah</button>
                    <button data-name="jillian" class="name-btn btn-primary ff9-font py-3 rounded-lg">Jillian</button>
                </div>
                <button id="reset-scores-btn" class="text-stone-400 mt-8 text-xs underline">Reset All Scores</button>
            </div>

            <div id="quiz-selection-screen" class="hidden">
                <h1 id="quest-log-title" class="ff9-font text-3xl text-yellow-300 mb-8">Quest Log</h1>
                <div id="quiz-set-buttons" class="grid grid-cols-1 gap-4"></div>
            </div>

            <div id="quiz-screen" class="hidden">
                <p id="round-indicator" class="ff9-font text-xl text-yellow-300 mb-1"></p>
                <p id="question-counter" class="text-sm text-stone-300 mb-4"></p>
                
                <img id="question-image" class="w-full max-h-64 object-contain mb-6 rounded-lg border-2 border-blue-400 hidden" src="" alt="Quiz Visual">
                
                <h2 id="question-text" class="text-2xl font-bold mb-6"></h2>
                <audio id="question-audio-player" class="w-full mb-6 hidden" controls></audio>
                <div id="answer-buttons" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                <button id="next-btn" class="btn-primary ff9-font py-3 px-8 rounded-lg mt-8 w-full hidden">Next Question</button>
            </div>

            <div id="end-screen" class="hidden">
                <h1 class="ff9-font text-4xl text-yellow-300 mb-4">Quest Complete!</h1>
                <p class="text-xl mb-2">You scored:</p>
                <p id="score-text" class="text-5xl font-bold text-yellow-300 mb-8"></p>
                <button id="return-log-btn" class="btn-primary ff9-font py-3 px-8 rounded-lg w-full mb-4">Take Another Quest</button>
            </div>
        </div>
    </div>

    <!-- Audio assets -->
    <audio id="sfx-menu" src="sounds/Select.mp3"></audio>
    <audio id="sfx-correct" src="sounds/Select.mp3"></audio>
    <audio id="sfx-incorrect" src="sounds/Cancel.mp3"></audio>
    <audio id="sfx-start" src="sounds/Moogle.mp3"></audio>
    <audio id="sfx-end" src="sounds/Moogle.mp3"></audio>
    <audio id="bgm" src="sounds/FBattle.mp3" loop></audio>

    <script>
    window.addEventListener('load', () => {
        const titleScreen = document.getElementById('title-screen');
        const quizSelectionScreen = document.getElementById('quiz-selection-screen');
        const quizScreen = document.getElementById('quiz-screen');
        const endScreen = document.getElementById('end-screen');
        const questionImage = document.getElementById('question-image');
        const questionAudioPlayer = document.getElementById('question-audio-player');
        const nextBtn = document.getElementById('next-btn');
        const bgm = document.getElementById('bgm');
        
        let quizData = { patrick: [], hannah: [], jillian: [] };
        let askedQuestions = new Set();
        
        // NEW: Sequence tracking variables
        let currentQuestSequence = [];
        let currentQuestionIndex = 0;
        let currentQuestion;
        
        let currentPlayerName = '';
        let currentSessionScore = 0;
        let maxSessionScore = 0;
        let playerScores = JSON.parse(localStorage.getItem('quizPlayerScores')) || { patrick: 0, hannah: 0, jillian: 0 };

        async function loadAllQuizData() {
            try {
                const [p, h, j] = await Promise.all([
                    fetch('patrick_questions.json').then(r => r.json()),
                    fetch('hannah_questions.json').then(r => r.json()),
                    fetch('jillian_questions.json').then(r => r.json())
                ]);
                quizData.patrick = p.map(q => ({...q, theme: 'patrick'}));
                quizData.hannah = h.map(q => ({...q, theme: 'hannah'}));
                quizData.jillian = j.map(q => ({...q, theme: 'jillian'}));
                document.getElementById('loading-overlay').classList.add('hidden');
            } catch (e) { 
                console.error("Load failed", e); 
                document.getElementById('loading-overlay').innerHTML = '<h2 class="text-red-400">Failed to load quests.</h2>';
            }
        }

        function playSound(s) { s.currentTime = 0; s.play().catch(e => {}); }

        function updateScoreDisplay() {
            document.getElementById('patrick-score').innerText = playerScores.patrick;
            document.getElementById('hannah-score').innerText = playerScores.hannah;
            document.getElementById('jillian-score').innerText = playerScores.jillian;
        }

        // Helper to grab random, unasked questions
        function getRandomQuestions(array, count) {
            let available = array.filter(q => !askedQuestions.has(q.question));
            // Failsafe: if we run out of unique questions, reuse old ones
            if (available.length < count) available = [...array]; 
            return available.sort(() => Math.random() - 0.5).slice(0, count);
        }

        function buildQuestSequence(theme) {
            const themeQs = quizData[theme];
            
            // 1. Separate the theme's questions by type
            const textQs = themeQs.filter(q => !q.imageSrc && !q.audioSrc);
            const picQs = themeQs.filter(q => q.imageSrc);
            const soundQs = themeQs.filter(q => q.audioSrc);
            
            // 2. Grab 3 of each
            const round1Text = getRandomQuestions(textQs, 3).map(q => ({...q, roundTitle: 'Round 1: Text Trivia'}));
            const round2Pic = getRandomQuestions(picQs, 3).map(q => ({...q, roundTitle: 'Round 2: Picture Identification'}));
            const round3Sound = getRandomQuestions(soundQs, 3).map(q => ({...q, roundTitle: 'Round 3: Audio Challenge'}));
            
            // 3. Find 1 Hard question from OTHER themes
            let otherHardQs = [];
            Object.keys(quizData).forEach(t => {
                if (t !== theme) {
                    const hardFromTheme = quizData[t].filter(q => q.difficulty === 'hard');
                    otherHardQs = otherHardQs.concat(hardFromTheme);
                }
            });
            const finalBossQ = getRandomQuestions(otherHardQs, 1).map(q => ({...q, roundTitle: 'Final Boss Question!'}));
            
            // 4. Assemble the 10-question gauntlet
            currentQuestSequence = [...round1Text, ...round2Pic, ...round3Sound, ...finalBossQ];
            currentQuestionIndex = 0;
            currentSessionScore = 0; 
            maxSessionScore = 0;
        }

        function populateQuizSetButtons() {
            const container = document.getElementById('quiz-set-buttons');
            container.innerHTML = '';
            Object.keys(quizData).forEach(theme => {
                const btn = document.createElement('button');
                btn.className = 'btn-primary ff9-font py-4 rounded-lg capitalize text-xl';
                btn.innerText = `Start ${theme}'s Quest`;
                
                btn.onclick = () => {
                    buildQuestSequence(theme);
                    quizSelectionScreen.classList.add('hidden');
                    quizScreen.classList.remove('hidden');
                    showNextQuestion();
                };
                container.appendChild(btn);
            });
        }

        function showNextQuestion() {
            resetState();
            currentQuestion = currentQuestSequence[currentQuestionIndex];
            askedQuestions.add(currentQuestion.question); // Mark as asked so we don't repeat it soon

            const roundIndicator = document.getElementById('round-indicator');
            roundIndicator.innerText = currentQuestion.roundTitle;
            
            // Add red glowing text for the final boss question
            if (currentQuestionIndex === 9) {
                roundIndicator.classList.add('boss-text');
            } else {
                roundIndicator.classList.remove('boss-text');
            }

            document.getElementById('question-counter').innerText = `Question ${currentQuestionIndex + 1} of 10`;
            document.getElementById('question-text').innerText = currentQuestion.question;

            if (currentQuestion.imageSrc) {
                questionImage.src = currentQuestion.imageSrc;
                questionImage.classList.remove('hidden');
            }
            if (currentQuestion.audioSrc) {
                questionAudioPlayer.src = currentQuestion.audioSrc;
                questionAudioPlayer.classList.remove('hidden');
                bgm.pause();
            }

            [...currentQuestion.answers].sort(() => Math.random() - 0.5).forEach(ans => {
                const b = document.createElement('button');
                b.innerText = ans.text;
                b.className = 'answer-btn p-4 rounded-lg';
                if (ans.correct) b.dataset.correct = "true";
                b.onclick = selectAnswer;
                document.getElementById('answer-buttons').appendChild(b);
            });
        }

        function selectAnswer(e) {
            questionAudioPlayer.pause();
            const btn = e.target;
            const correct = btn.dataset.correct === 'true';
            
            // Dynamic Scoring: 1 pt for your own theme, 3 pts for other themes (including the Final Boss)
            const points = (currentPlayerName !== currentQuestion.theme) ? 3 : 1;
            maxSessionScore += points;

            if (correct) {
                currentSessionScore += points;
                playerScores[currentPlayerName] += points;
                btn.classList.add('correct');
                playSound(document.getElementById('sfx-correct'));
            } else {
                btn.classList.add('incorrect');
                playSound(document.getElementById('sfx-incorrect'));
            }

            localStorage.setItem('quizPlayerScores', JSON.stringify(playerScores));
            updateScoreDisplay();

            Array.from(document.getElementById('answer-buttons').children).forEach(b => {
                if (b.dataset.correct === 'true') b.classList.add('correct');
                b.disabled = true;
            });
            
            nextBtn.classList.remove('hidden');
            
            // Change button text if it's the last question
            if (currentQuestionIndex === currentQuestSequence.length - 1) {
                nextBtn.innerText = "Complete Quest";
            } else {
                nextBtn.innerText = "Next Question";
            }
        }

        function resetState() {
            nextBtn.classList.add('hidden');
            document.getElementById('answer-buttons').innerHTML = '';
            questionImage.classList.add('hidden');
            questionImage.src = '';
            questionAudioPlayer.classList.add('hidden');
            questionAudioPlayer.pause();
            questionAudioPlayer.src = '';
        }

        nextBtn.onclick = () => {
            currentQuestionIndex++;
            if (currentQuestionIndex < currentQuestSequence.length) {
                // Resume BGM if previous round was an audio question
                if (bgm.paused) bgm.play();
                showNextQuestion();
            } else {
                showResults();
            }
        };

        function showResults() {
            quizScreen.classList.add('hidden');
            endScreen.classList.remove('hidden');
            bgm.play();
            document.getElementById('score-text').innerText = `${currentSessionScore} / ${maxSessionScore}`;
        }

        // Setup Hero Select
        document.querySelectorAll('#name-selection-buttons button').forEach(btn => {
            btn.onclick = (e) => {
                currentPlayerName = e.target.dataset.name;
                titleScreen.classList.add('hidden');
                document.getElementById('back-to-select-btn').classList.remove('hidden');
                bgm.volume = document.getElementById('volume-slider').value;
                bgm.play();
                
                quizSelectionScreen.classList.remove('hidden');
                populateQuizSetButtons();
            };
        });

        // Volume control listener
        document.getElementById('volume-slider').addEventListener('input', (e) => {
            bgm.volume = e.target.value;
        });

        document.getElementById('return-log-btn').onclick = () => {
            endScreen.classList.add('hidden');
            quizSelectionScreen.classList.remove('hidden');
        };

        document.getElementById('back-to-select-btn').onclick = () => location.reload();
        
        document.getElementById('reset-scores-btn').onclick = () => {
            playerScores = { patrick: 0, hannah: 0, jillian: 0 };
            localStorage.setItem('quizPlayerScores', JSON.stringify(playerScores));
            updateScoreDisplay();
        };
        
        loadAllQuizData();
        updateScoreDisplay();
    });
    </script>
</body>
</html>
